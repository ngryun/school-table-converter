<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>엑셀 → 한글 표 변환기</title>
<style>
  :root {
    --ink: #1b2838;
    --muted: #65758a;
    --line: #d6e1ec;
    --panel: #ffffff;
    --page: #f4f7fb;
    --primary: #2563a8;
    --primary-dark: #17324d;
    --accent: #2a9d8f;
  }

  * { box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
    max-width: 820px;
    margin: 36px auto;
    padding: 0 18px 36px;
    color: var(--ink);
    background:
      linear-gradient(180deg, #eef5fb 0, var(--page) 220px),
      var(--page);
  }

  h1 {
    font-size: 22px;
    line-height: 1.3;
    margin: 0 0 18px;
    color: var(--primary-dark);
  }

  .card {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 18px;
    margin-bottom: 16px;
    background: var(--panel);
    box-shadow: 0 10px 26px rgba(23, 50, 77, 0.08);
  }

  .row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  label, strong { color: var(--primary-dark); }

  input[type="file"] {
    min-width: 280px;
    max-width: 100%;
    padding: 7px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #fbfdff;
  }

  button {
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 9px 14px;
    font-size: 14px;
    color: #fff;
    background: var(--primary);
    cursor: pointer;
  }

  button:first-child {
    color: var(--primary-dark);
    border-color: #b8cce2;
    background: #edf5fb;
  }

  button:hover:not(:disabled), a.dl:hover { filter: brightness(0.96); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  #log {
    white-space: pre-wrap;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 12px;
    line-height: 1.55;
    background: #102033;
    color: #e8eef6;
    padding: 13px;
    border-radius: 6px;
    max-height: 360px;
    overflow-y: auto;
  }

  .ok { color: #7ae0b6; }
  .err { color: #ff9d9d; }
  .muted { color: var(--muted); }

  a.dl {
    display: inline-block;
    padding: 9px 14px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    border-radius: 6px;
  }

  footer {
    margin-top: 18px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  footer a {
    color: var(--primary);
    text-decoration: none;
  }

  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <h1>엑셀 → 한글 표 변환기</h1>

  <div class="card">
    <div class="row">
      <label>xlsx 파일:</label>
      <input id="file" type="file" accept=".xlsx,.xls">
    </div>
    <div class="row">
      <button id="btnSelftest">셀프 테스트 (3×3 표 1개)</button>
      <button id="btnConvert" disabled>선택한 xlsx → hwp 변환</button>
      <span id="dlSlot"></span>
    </div>
    <div class="muted">파일은 서버로 업로드하지 않고 브라우저 안에서 변환합니다. 결과 .hwp는 한컴 한글에서 열어 확인하세요.</div>
  </div>

  <div class="card">
    <strong>로그</strong>
    <div id="log"></div>
  </div>

  <footer>
    <a href="THIRD_PARTY_NOTICES.md">오픈소스 라이선스</a>
  </footer>

  <script src="lib/sheetjs/xlsx.full.min.js"></script>
  <script type="module" src="app.js?v=20260524-selection-note-target"></script>
</body>
</html>
