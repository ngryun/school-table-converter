<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강원 교육과정편제 프로그램 양식 한글(hwp) 변환 프로그램</title>
<style>
  :root {
    --ink: #1b2838;
    --muted: #65758a;
    --line: #d6e1ec;
    --panel: #ffffff;
    --page: #f4f7fb;
    --primary: #2563a8;
    --primary-dark: #17324d;
    --accent: #2a9d8f;
  }

  * { box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
    max-width: 1040px;
    margin: 36px auto;
    padding: 0 18px 36px;
    color: var(--ink);
    background:
      linear-gradient(180deg, #eef5fb 0, var(--page) 220px),
      var(--page);
  }

  h1 {
    font-size: 22px;
    line-height: 1.3;
    margin: 0 0 18px;
    color: var(--primary-dark);
  }

  .card {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 18px;
    margin-bottom: 16px;
    background: var(--panel);
    box-shadow: 0 10px 26px rgba(23, 50, 77, 0.08);
  }

  .row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  label, strong { color: var(--primary-dark); }

  input[type="file"] {
    min-width: 280px;
    max-width: 100%;
    padding: 7px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #fbfdff;
  }

  button {
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 9px 14px;
    font-size: 14px;
    color: #fff;
    background: var(--primary);
    cursor: pointer;
  }

  button:first-child {
    color: var(--primary-dark);
    border-color: #b8cce2;
    background: #edf5fb;
  }

  button:hover:not(:disabled), a.dl:hover { filter: brightness(0.96); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  #log {
    white-space: pre-wrap;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 12px;
    line-height: 1.55;
    background: #102033;
    color: #e8eef6;
    padding: 13px;
    border-radius: 6px;
    max-height: 360px;
    overflow-y: auto;
  }

  .ok { color: #7ae0b6; }
  .err { color: #ff9d9d; }
  .muted { color: var(--muted); }

  a.dl {
    display: inline-block;
    padding: 9px 14px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    border-radius: 6px;
  }

  .results {
    display: grid;
    gap: 16px;
    margin-bottom: 16px;
  }

  .result-card {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    box-shadow: 0 10px 26px rgba(23, 50, 77, 0.08);
    overflow: hidden;
  }

  .result-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    background: #fbfdff;
  }

  .result-title {
    display: grid;
    gap: 3px;
  }

  .result-title strong {
    font-size: 15px;
  }

  .preview-wrap {
    max-height: 420px;
    overflow: auto;
    padding: 14px;
    background: #f7f9fc;
  }

  .preview-wrap table {
    margin: 0 auto;
    background: #fff;
    color: var(--ink);
    box-shadow: 0 6px 18px rgba(27, 40, 56, 0.06);
  }

  .preview-wrap th,
  .preview-wrap td {
    font-size: 12px;
    line-height: 1.15;
  }

  footer {
    margin-top: 18px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  footer .credit {
    margin-bottom: 4px;
  }

  footer a {
    color: var(--primary);
    text-decoration: none;
  }

  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <h1>강원 교육과정편제 프로그램 양식 한글(hwp) 변환 프로그램</h1>

  <div class="card">
    <div class="row">
      <label>교육청 제출용 엑셀 파일:</label>
      <input id="file" type="file" accept=".xlsx,.xls,.xlsm">
    </div>
    <div class="row">
      <button id="btnConvert" disabled>선택한 엑셀 → hwp 변환</button>
      <span id="dlSlot"></span>
    </div>
    <div class="muted">파일은 서버로 업로드하지 않고 브라우저 안에서 변환합니다. 결과 .hwp는 한컴 한글에서 열어 확인하세요.</div>
  </div>

  <div id="results" class="results" hidden></div>

  <div class="card">
    <strong>로그</strong>
    <div id="log"></div>
  </div>

  <footer>
    <div class="credit">제작: 설악고등학교 남궁연</div>
    <a href="THIRD_PARTY_NOTICES.md">rhwp 및 SheetJS 오픈소스 라이선스</a>
  </footer>

  <script src="lib/sheetjs/xlsx.full.min.js"></script>
  <script type="module" src="app.js?v=20260527-office-file-label"></script>
</body>
</html>
